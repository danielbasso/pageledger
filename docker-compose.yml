# PageLedger — the entire stack, identical on a laptop and a single EC2 instance.
# step 1 brings up only the infrastructure services (Kafka + Postgres).
# Application services (producer, flink-job, api) are added in their own phases.

services:
  kafka:
    image: apache/kafka:4.2.1          # official ASF image, native KRaft (no ZooKeeper), free forever — NOT bitnami
    container_name: pageledger-kafka
    ports:
      - "29092:29092"                  # host-facing listener (localhost:29092 for kcat / console tools)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Three listeners: internal (container network), controller (KRaft quorum), external (host)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Single-broker settings — replication factor 1 everywhere (single-node scale).
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s

  postgres:
    image: postgres:17.10
    container_name: pageledger-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pageledger}
      POSTGRES_USER: ${POSTGRES_USER:-pageledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pageledger}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # schema.sql is mounted into docker-entrypoint-initdb.d/ in step 2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pageledger} -d ${POSTGRES_DB:-pageledger}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

volumes:
  kafka-data:
  postgres-data:
