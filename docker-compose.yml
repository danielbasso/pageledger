# PageLedger — the entire stack, identical on a laptop and a single EC2 instance.

services:
  kafka:
    image: apache/kafka:4.2.1          # official ASF image, native KRaft (no ZooKeeper), free forever — NOT bitnami
    container_name: pageledger-kafka
    ports:
      - "29092:29092"                  # host-facing listener (localhost:29092 for kcat / console tools)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Three listeners: internal (container network), controller (KRaft quorum), external (host)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Single-broker settings — replication factor 1 everywhere (single-node scale).
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s

  postgres:
    image: postgres:17.10
    container_name: pageledger-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pageledger}
      POSTGRES_USER: ${POSTGRES_USER:-pageledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pageledger}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro   # runs automatically on first init
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pageledger} -d ${POSTGRES_DB:-pageledger}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  producer:
    build: ./producer
    container_name: pageledger-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      MODE: ${MODE:-FIXTURE}                        # FIXTURE (default, local) | LIVE (prod)
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_RAW_TOPIC: ${KAFKA_RAW_TOPIC:-wiki.events.raw}
      WIKI_STREAM_URL: ${WIKI_STREAM_URL:-https://stream.wikimedia.org/v2/stream/recentchange}
      FIXTURE_FILE: ${FIXTURE_FILE:-./fixtures/wiki_events_sample.jsonl}
      PLAYBACK_SPEED: ${PLAYBACK_SPEED:-1.0}
    restart: unless-stopped

  # --- Flink session cluster -------------------------------------------------
  # A real JobManager + TaskManager (not an embedded mini-cluster) because the
  # rebuild orchestration drives the JobManager REST API to cancel and resubmit
  # the fold job. All flink-* services share the one pageledger-flink image.
  flink-jobmanager:
    image: pageledger-flink
    build: ./flink-job
    container_name: pageledger-flink-jobmanager
    command: jobmanager
    ports:
      - "8081:8081"                                  # Flink web UI / REST API
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.address: flink-jobmanager
        rest.bind-address: 0.0.0.0
        parallelism.default: 1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/overview >/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s

  flink-taskmanager:
    image: pageledger-flink
    build: ./flink-job
    container_name: pageledger-flink-taskmanager
    command: taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 1
        # Repeated PyFlink job (re)submissions on a session cluster leak both
        # metaspace and direct/off-heap memory (the Beam python runner). Size the
        # TM generously so many rebuilds work; reclaim managed memory since the
        # HashMap state backend (not RocksDB) is used.
        taskmanager.memory.process.size: 4096m
        taskmanager.memory.jvm-metaspace.size: 1024m
        taskmanager.memory.task.off-heap.size: 512m
        taskmanager.memory.managed.size: 256m
        classloader.check-leaked-classloader: false

  # One-shot: submits the stage-1 validation job to the running cluster, then exits.
  flink-stage1-submitter:
    image: pageledger-flink
    build: ./flink-job
    container_name: pageledger-flink-stage1-submitter
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      flink-taskmanager:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_RAW_TOPIC: ${KAFKA_RAW_TOPIC:-wiki.events.raw}
      KAFKA_VALID_TOPIC: ${KAFKA_VALID_TOPIC:-wiki.events.valid}
      KAFKA_DEADLETTER_TOPIC: ${KAFKA_DEADLETTER_TOPIC:-wiki.events.deadletter}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-pageledger}
      POSTGRES_USER: ${POSTGRES_USER:-pageledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pageledger}
    command: >
      flink run -d -m flink-jobmanager:8081
      -py /opt/flink/usrlib/stage1_validate.py
    restart: on-failure

  # One-shot: submits the stage-2 fold job (silver -> gold), targeting page_state
  # from earliest. The rebuild resubmits this same job with --sink-table.
  flink-stage2-submitter:
    image: pageledger-flink
    build: ./flink-job
    container_name: pageledger-flink-stage2-submitter
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      flink-taskmanager:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_VALID_TOPIC: ${KAFKA_VALID_TOPIC:-wiki.events.valid}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-pageledger}
      POSTGRES_USER: ${POSTGRES_USER:-pageledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pageledger}
    command: >
      flink run -d -m flink-jobmanager:8081
      -py /opt/flink/usrlib/stage2_fold.py --sink-table page_state
    restart: on-failure

  # --- API + dashboard -------------------------------------------------------
  api:
    build: ./api
    container_name: pageledger-api
    depends_on:
      postgres:
        condition: service_healthy
      flink-jobmanager:
        condition: service_started
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-pageledger}
      POSTGRES_USER: ${POSTGRES_USER:-pageledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pageledger}
      # Rebuild orchestration: cancel/metrics via Flink REST, job submission via
      # `docker exec` into the JobManager container (Docker socket mounted below).
      FLINK_REST_URL: http://flink-jobmanager:8081
      FLINK_JM_ADDRESS: flink-jobmanager:8081
      FLINK_CONTAINER: pageledger-flink-jobmanager
      STAGE2_JOB_FILE: /opt/flink/usrlib/stage2_fold.py
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # for `flink run` via docker exec into the JobManager
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/api/stats', timeout=3)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  kafka-data:
  postgres-data:
