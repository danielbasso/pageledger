# Production overrides for the single EC2 instance. Use with:
#   MODE=LIVE API_PORT=80 docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# (MODE + API_PORT come from the instance's .env.)

services:
  kafka:
    restart: unless-stopped
    environment:
      # Keep the event log forever: the rebuild replays wiki.events.valid from
      # earliest, so it must not age out (default is 7 days).
      KAFKA_LOG_RETENTION_MS: -1
      KAFKA_HEAP_OPTS: -Xmx768m -Xms768m

  postgres:
    restart: unless-stopped

  # Flink memory tuned to fit the 8 GB box alongside Kafka + Postgres + API.
  # restart: unless-stopped is essential — repeated PyFlink submissions leak
  # metaspace, so the TaskManager will eventually OOM; Docker must bring it back
  # automatically or the pipeline stays dead.
  flink-jobmanager:
    restart: unless-stopped
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.address: flink-jobmanager
        rest.bind-address: 0.0.0.0
        parallelism.default: 1
        jobmanager.memory.process.size: 1024m

  flink-taskmanager:
    restart: unless-stopped
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 1
        taskmanager.memory.process.size: 3584m
        taskmanager.memory.jvm-metaspace.size: 1536m
        taskmanager.memory.task.off-heap.size: 512m
        taskmanager.memory.managed.size: 256m
        classloader.check-leaked-classloader: false

  # Resubmits a pipeline job if it dies. Container restarts alone aren't enough:
  # after a TaskManager crash the jobs end up FAILED and stay down.
  flink-watchdog:
    image: pageledger-flink
    container_name: pageledger-flink-watchdog
    restart: unless-stopped
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    volumes:
      - ./flink-job:/watchdog:ro
    environment:
      FLINK_JM_ADDRESS: flink-jobmanager:8081
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_RAW_TOPIC: ${KAFKA_RAW_TOPIC:-wiki.events.raw}
      KAFKA_VALID_TOPIC: ${KAFKA_VALID_TOPIC:-wiki.events.valid}
      KAFKA_DEADLETTER_TOPIC: ${KAFKA_DEADLETTER_TOPIC:-wiki.events.deadletter}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-pageledger}
      POSTGRES_USER: ${POSTGRES_USER:-pageledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pageledger}
    entrypoint: ["/bin/bash", "/watchdog/watchdog.sh"]
